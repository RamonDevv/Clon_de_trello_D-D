<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rello - Trello Clon</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="Main_Container">
      <div class="Input_Container">
        <input type="text" id="new-task-input" placeholder="Enter a new task..." />
        <button onclick="addNewTask()">Add Task</button>
      </div>
    <div class="To_Do_Container">
    <h3 id="Todo_Column">To Do</h3>
      <ul id="task-list_To_Do">
   
      </ul>
    </div>
      <div class="In_Progress_Container">
    <h3 id="In_Progress_Column">In Progress</h3>
      <ul id="In_Progress_task-list">
  
      </ul>
    </div>
      <div class="Completed_Container">
    <h3 id="Completed_Column">Completed</h3>
      <ul id="Completed_task-list">

      </ul>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
